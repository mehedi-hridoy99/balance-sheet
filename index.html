:root{
  --paper:#F1E9D9;
  --paper-2:#E8DDC7;
  --card:#FBF6EA;
  --card-2:#F5EEDC;
  --ink:#2B2522;
  --ink-soft:#6E6155;
  --ink-faint:#A2937F;
  --line:#DCCDB1;
  --line-soft:#E7DBC3;
  --green:#2F6E4F;
  --green-deep:#1C4E36;
  --green-soft:#D6E4D6;
  --rust:#AE5029;
  --rust-deep:#85391B;
  --rust-soft:#EBD7C6;
  --gold:#BC9233;
  --gold-soft:#E9D49A;
  --shadow:rgba(43,37,34,.13);
  --shadow-lg:rgba(43,37,34,.22);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Spline',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:15px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
input,select,button,textarea{font-family:inherit;font-size:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}
.num{font-variant-numeric:tabular-nums;}

#app{
  max-width:520px;margin:0 auto;min-height:100%;
  background:
    radial-gradient(120% 60% at 50% 0%, rgba(255,255,255,.35), transparent 60%),
    var(--paper);
  position:relative;
  padding-bottom:calc(86px + env(safe-area-inset-bottom));
}
.header{
  position:sticky;top:0;z-index:40;
  background:var(--ink);
  color:var(--paper);
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 14px var(--shadow);
}
.month-btn{
  flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:1px;
  padding:6px 4px;border-radius:12px;
}
.month-btn .kicker{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold-soft);font-weight:600;
}
.month-btn .mname{
  font-family:'Fraunces';font-weight:600;font-size:21px;line-height:1.1;
  display:flex;align-items:center;gap:6px;
}
.month-btn .mname svg{opacity:.7;}
.icon-btn{
  width:42px;height:42px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(255,255,255,.08);
  color:var(--paper);flex:none;
}
.icon-btn:active{background:rgba(255,255,255,.18);}

.screen{display:none;animation:fade .32s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.pad{padding:18px 16px 6px;}

.scr-title{
  font-family:'Fraunces';font-weight:600;font-size:13px;
  letter-spacing:.04em;color:var(--ink-soft);
  text-transform:uppercase;margin-bottom:2px;
}

.hero{
  background:linear-gradient(165deg,#34302A,#211D1A);
  color:var(--paper);
  border-radius:22px;
  padding:22px 22px 20px;
  margin:14px 16px 4px;
  position:relative;overflow:hidden;
  box-shadow:0 14px 30px -10px var(--shadow-lg);
}
.hero::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(255,255,255,.035) 27px,rgba(255,255,255,.035) 28px);
  pointer-events:none;
}
.hero .hl{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold-soft);font-weight:600;
}
.hero .hv{
  font-family:'Fraunces';font-weight:600;
  font-size:clamp(40px,13.5vw,58px);line-height:1.05;
  margin:6px 0 2px;letter-spacing:-.01em;
}
.hero .hv .cur{font-size:.5em;vertical-align:.32em;color:var(--ink-faint);margin-right:.06em;}
.hero .hsub{display:flex;gap:14px;font-size:12.5px;color:#C9BCA8;margin-top:4px;}
.hero .hsub b{color:var(--paper);font-weight:600;}
.hero .compare{
  margin-top:16px;display:flex;flex-direction:column;gap:9px;position:relative;z-index:1;
}
.cmp-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.cmp-row .cl{width:54px;flex:none;color:#C9BCA8;text-transform:uppercase;letter-spacing:.08em;font-size:10px;font-weight:600;}
.cmp-track{flex:1 1 auto;min-width:0;height:10px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden;}
.cmp-fill{display:block;height:100%;border-radius:6px;min-width:6px;}
.cmp-fill.cr{background:#5BA77E;}
.cmp-fill.db{background:#C9764C;}
.cmp-row .cv{width:78px;flex:none;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:14px 16px 4px;}
.stat-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:9px 16px 4px;}
.stat-card.mini{padding:11px 11px;}
.stat-card.mini .label{font-size:9px;letter-spacing:.08em;}
.stat-card.mini .value{font-size:18px;margin-top:4px;}
.stat-card.mini .value .cur{font-size:.6em;}
.stat-card{
  background:var(--card);
  border:1px solid var(--line-soft);
  border-radius:16px;padding:13px 14px;
  box-shadow:0 3px 10px -6px var(--shadow);
}
.stat-card .label{
  font-size:10px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;display:flex;align-items:center;gap:5px;
}
.stat-card .value{
  font-family:'Fraunces';font-weight:600;font-size:25px;margin-top:5px;
  font-variant-numeric:tabular-nums;line-height:1.1;
}
.stat-card .value .cur{font-size:.55em;color:var(--ink-faint);vertical-align:.15em;}
.stat-card .meta{font-size:11px;color:var(--ink-soft);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-card.pos .value{color:var(--green);}
.stat-card.neg .value{color:var(--rust);}

/* liquid-position strip on Overview */
.liq-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 16px;margin-top:14px;}
.liq-card{
  background:var(--card);border:1px solid var(--line-soft);
  border-radius:16px;padding:13px 14px;
  box-shadow:0 3px 10px -6px var(--shadow);
}
.liq-card .liq-label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;
}
.liq-card .liq-val{
  font-family:'Fraunces';font-weight:600;font-size:22px;margin-top:4px;
  font-variant-numeric:tabular-nums;line-height:1.1;
}
.liq-card .liq-val .cur{font-size:.55em;color:var(--ink-faint);vertical-align:.15em;}
.liq-card.pos .liq-val{color:var(--green);}
.liq-card.neg .liq-val{color:var(--rust);}
.liq-card .liq-meta{font-size:11px;color:var(--ink-soft);margin-top:1px;}

/* second hero (net worth) */
.hero-alt{background:linear-gradient(165deg,#3A3328,#231D17);margin-top:14px;}
.hero-alt .hl{color:#E9D49A;}
.nw-rows{margin-top:14px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1;}
.nw-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;}
.nw-row .nwl{color:#C9BCA8;}
.nw-row .nwv{font-variant-numeric:tabular-nums;font-weight:600;color:#D8C9AE;}
.nw-row .nwv.neg{color:#E59E7A;}

/* credit card list (Assets page) */
.card-list-item{
  background:var(--card);border:1px solid var(--line-soft);
  border-radius:14px;padding:14px;margin:0 0 9px 0;
  box-shadow:0 3px 8px -6px var(--shadow);
}
.card-list-item:active{background:var(--card-2);}
.card-list-item .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.card-list-item .card-name{
  font-family:'Fraunces';font-weight:600;font-size:16px;
  display:flex;align-items:center;gap:8px;
}
.card-list-item .card-name .dot{
  display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--rust);
}
.card-list-item .card-bal{
  font-family:'Fraunces';font-weight:600;font-size:21px;line-height:1;
  color:var(--rust-deep);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;
}
.card-list-item .card-bal .cur{font-size:.6em;color:var(--ink-faint);}
.card-list-item .card-bal .ovd{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;font-family:'Spline';margin-top:2px;}
.card-list-item .card-detail{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px;
  padding-top:11px;border-top:1px dashed var(--line);
}
.card-list-item .cd-cell .cd-l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:2px;}
.card-list-item .cd-cell .cd-v{font-family:'Fraunces';font-weight:600;font-size:14.5px;font-variant-numeric:tabular-nums;}
.card-list-item .cd-cell.due-soon .cd-v{color:var(--rust-deep);}
.card-list-item .card-flow{
  margin-top:9px;font-size:11px;color:var(--ink-soft);
  display:flex;gap:13px;flex-wrap:wrap;
}
.card-list-item .card-flow b{color:var(--ink);font-variant-numeric:tabular-nums;}
.card-list-item .card-notes{
  margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);
  font-size:12px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.5;
}

/* compact card strip on Debit page */
.card-strip{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px 16px;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.card-strip::-webkit-scrollbar{display:none;}
.card-chip{
  flex:none;min-width:128px;padding:9px 11px;border-radius:11px;
  background:var(--card);border:1px solid var(--line-soft);
  box-shadow:0 2px 6px -4px var(--shadow);
}
.card-chip .cc-name{font-size:10.5px;letter-spacing:.05em;font-weight:600;color:var(--ink-soft);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.card-chip .cc-bal{font-family:'Fraunces';font-weight:600;font-size:15.5px;color:var(--rust-deep);
  font-variant-numeric:tabular-nums;margin-top:2px;}

/* payment-method badge on debit rows */
.pay-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:7px;
  background:var(--card-2);border:1px solid var(--line);color:var(--ink-soft);
  white-space:nowrap;
}
.pay-badge.cash{background:#E5EEDF;border-color:#C2D5B8;color:#3D5C2D;}
.pay-badge.card{background:#F1E0CF;border-color:#DABFA3;color:#7A4A1F;}
.pay-badge.payment{background:#D9E4EE;border-color:#B1C4D9;color:#274560;}

/* Current tab — pool blocks */
.pool-big-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:11px;
}
.pool-bigval{
  font-family:'Fraunces';font-weight:600;font-size:32px;line-height:1;
  font-variant-numeric:tabular-nums;
}
.pool-bigval.pos{color:var(--green);}
.pool-bigval .cur{font-size:.55em;color:var(--ink-faint);vertical-align:.18em;margin-right:.05em;}
.pool-actions{display:flex;gap:6px;flex:none;}
.pool-act-btn{
  width:38px;height:38px;border-radius:11px;font-size:18px;font-weight:600;
  background:var(--card-2);border:1px solid var(--line);color:var(--ink);
  display:grid;place-items:center;line-height:1;
}
.pool-act-btn:active{transform:scale(.92);background:var(--paper-2);}
.pool-act-btn.plus{background:var(--green-soft);border-color:#BFD3BF;color:var(--green-deep);}
.pool-act-btn.minus{background:var(--rust-soft);border-color:#E0C3B0;color:var(--rust-deep);}
.pool-act-btn.edit{width:auto;padding:0 12px;font-size:12px;font-weight:600;letter-spacing:.04em;}
.pool-flow{
  font-size:11px;color:var(--ink-soft);
  display:flex;gap:13px;flex-wrap:wrap;
}
.pool-flow b{color:var(--ink);font-variant-numeric:tabular-nums;}

.pool-item{
  background:var(--card-2);border:1px solid var(--line-soft);
  border-radius:12px;padding:12px;margin:0 0 8px 0;
}
.pool-item:active{background:var(--paper-2);}
.pool-item .pool-head{
  display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:7px;
}
.pool-item .pool-name{font-family:'Fraunces';font-weight:600;font-size:15.5px;}
.pool-item .pool-bal{
  font-family:'Fraunces';font-weight:600;font-size:19px;line-height:1;
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
.pool-item .pool-bal.pos{color:var(--green);}
.pool-item .pool-bal.neg{color:var(--rust-deep);}
.pool-item .pool-bal .cur{font-size:.6em;color:var(--ink-faint);}
.pool-notes{
  margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
  font-size:12px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.5;
}

.gauge-card{
  background:var(--card);border:1px solid var(--line-soft);
  border-radius:16px;padding:14px 15px;margin:4px 16px 0;
  box-shadow:0 3px 10px -6px var(--shadow);
}
.gauge-track{height:14px;border-radius:8px;background:var(--rust-soft);overflow:hidden;display:flex;margin-top:9px;}
.gauge-j{height:100%;background:linear-gradient(90deg,var(--green),var(--green-deep));}
.gauge-legend{display:flex;justify-content:space-between;font-size:11.5px;margin-top:8px;color:var(--ink-soft);}
.gauge-legend b{font-variant-numeric:tabular-nums;}
.dotg{color:var(--green);}.dotr{color:var(--rust);}

.section{margin:20px 16px 0;}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:9px;padding:0 2px;
}
.section-title{
  font-family:'Fraunces';font-weight:600;font-size:17px;
  display:flex;align-items:center;gap:8px;
}
.section-title .acc{
  width:7px;height:18px;border-radius:3px;background:var(--gold);display:inline-block;
}
.section-sub{font-size:11px;color:var(--ink-faint);font-weight:500;}
.add-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--ink);color:var(--paper);
  font-size:12px;font-weight:600;
  padding:7px 12px;border-radius:20px;
}
.add-btn:active{transform:scale(.96);}

.card{
  background:var(--card);
  border:1px solid var(--line-soft);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 3px 12px -7px var(--shadow);
}

.row{
  display:flex;align-items:center;gap:11px;
  padding:12px 14px;min-height:54px;
  border-bottom:1px solid var(--line-soft);
  position:relative;
}
.row:last-child{border-bottom:none;}
.row:active{background:var(--card-2);}
.row-body{flex:1;min-width:0;}
.row-name{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:7px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-meta{font-size:11.5px;color:var(--ink-soft);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-val{
  font-family:'Fraunces';font-weight:600;font-size:16px;
  font-variant-numeric:tabular-nums;flex:none;text-align:right;
}
.row-val .cur{font-size:.7em;color:var(--ink-faint);}
.row-val.pos{color:var(--green);}
.row-val.neg{color:var(--rust);}
.row .chev{flex:none;color:var(--ink-faint);opacity:.6;}

.entry{border-bottom:1px solid var(--line-soft);}
.entry:last-child{border-bottom:none;}
.entry .row{border-bottom:none;}
.entry-notes{
  padding:0 14px 12px 14px;margin-top:-4px;
  font-size:12.5px;color:var(--ink-soft);
  white-space:pre-wrap;line-height:1.5;
}
.entry-notes .nlabel{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:3px;
}

.tag{
  font-size:10px;font-weight:600;letter-spacing:.02em;
  padding:2.5px 7px;border-radius:7px;
  background:var(--paper-2);color:var(--ink-soft);
  border:1px solid var(--line);
  white-space:nowrap;
}
.tag.j{background:var(--green-soft);color:var(--green-deep);border-color:#BFD3BF;}
.tag.u{background:var(--rust-soft);color:var(--rust-deep);border-color:#E0C3B0;}

.foot-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;background:var(--card-2);
  border-top:1.5px solid var(--line);
  font-weight:600;
}
.foot-row .fl{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-soft);}
.foot-row .fv{font-family:'Fraunces';font-size:19px;font-variant-numeric:tabular-nums;}

.grp-label{
  padding:9px 14px 6px;font-size:10.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);font-weight:600;
  background:var(--card-2);border-bottom:1px solid var(--line-soft);
}

.bar-item{padding:11px 14px;border-bottom:1px solid var(--line-soft);}
.bar-item:last-child{border-bottom:none;}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;}
.bar-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-vals{font-size:12px;color:var(--ink-soft);flex:none;font-variant-numeric:tabular-nums;}
.bar-vals b{font-family:'Fraunces';color:var(--ink);font-size:13.5px;}
.bar-track{height:8px;border-radius:5px;background:var(--paper-2);overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold),#9C7826);}
.bar-fill.g{background:linear-gradient(90deg,var(--green),var(--green-deep));}
.bar-fill.r{background:linear-gradient(90deg,var(--rust),var(--rust-deep));}

.seg{
  display:flex;background:var(--paper-2);border-radius:12px;padding:3px;
  margin:0 16px;gap:3px;
}
.seg button{
  flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:600;
  color:var(--ink-soft);
}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 6px -3px var(--shadow);}

.panel{margin:16px 16px 0;}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--ink);color:var(--paper);
  padding:13px 15px;border-radius:14px 14px 0 0;
}
.panel-head .pt{font-family:'Fraunces';font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px;}
.panel-head .pt .pico{
  width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.1);
  display:grid;place-items:center;
}
.panel-tot{display:flex;align-items:center;gap:6px;font-size:12px;color:#C9BCA8;}
.tot-input{
  width:84px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:var(--paper);border-radius:8px;padding:5px 7px;font-size:13px;font-weight:600;
  text-align:right;font-variant-numeric:tabular-nums;
}
.panel-body{
  background:var(--card);border:1px solid var(--line-soft);border-top:none;
  border-radius:0 0 14px 14px;overflow:hidden;
}
.roi-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--card-2);border-bottom:1px solid var(--line-soft);
  font-size:12px;color:var(--ink-soft);
}
.roi-input{
  width:84px;background:var(--card);border:1px solid var(--line);
  border-radius:8px;padding:5px 7px;font-size:13px;font-weight:600;text-align:right;
  font-variant-numeric:tabular-nums;
}

.empty{padding:26px 18px;text-align:center;color:var(--ink-faint);}
.empty .ei{font-size:30px;margin-bottom:6px;opacity:.5;}
.empty .et{font-size:13px;}

.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  max-width:520px;margin:0 auto;
  background:var(--card);
  border-top:1px solid var(--line);
  display:flex;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 22px -12px var(--shadow-lg);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 1px;color:var(--ink-faint);border-radius:12px;min-width:0;
}
.tab svg{width:21px;height:21px;flex:none;}
.tab span{font-size:9px;font-weight:600;letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.tab.active{color:var(--ink);}
.tab.active svg{color:var(--green);}
.tab.active span{color:var(--ink);}

.fab{
  position:fixed;z-index:45;
  right:max(18px,calc(50% - 260px + 18px));
  bottom:calc(96px + env(safe-area-inset-bottom));
  width:56px;height:56px;border-radius:18px;
  background:var(--green);color:#fff;
  display:grid;place-items:center;
  box-shadow:0 10px 24px -6px rgba(47,110,79,.55);
}
.fab:active{transform:scale(.93);}
.fab svg{width:26px;height:26px;}

.backdrop{
  position:fixed;inset:0;z-index:60;
  background:rgba(30,25,22,.5);
  backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.backdrop.show{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;
  max-width:520px;margin:0 auto;
  background:var(--paper);
  border-radius:24px 24px 0 0;
  padding:8px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(110%);transition:transform .32s cubic-bezier(.32,.72,0,1);
  max-height:90vh;overflow-y:auto;
  box-shadow:0 -10px 40px -8px var(--shadow-lg);
}
.sheet.show{transform:translateY(0);}
.sheet-handle{
  width:38px;height:4px;border-radius:3px;background:var(--line);
  margin:6px auto 12px;
}
.sheet-title{font-family:'Fraunces';font-weight:600;font-size:21px;margin-bottom:3px;}
.sheet-desc{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px;}

.field{margin-bottom:14px;}
.field label{
  display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:600;margin-bottom:6px;
}
.field input,.field select,.field textarea{
  width:100%;background:var(--card);
  border:1.5px solid var(--line);border-radius:12px;
  padding:12px 13px;font-size:16px;
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--gold);
}
.field .hint{font-size:11px;color:var(--ink-faint);margin-top:5px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}

.computed{
  background:var(--card-2);border:1px dashed var(--line);
  border-radius:12px;padding:10px 13px;margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;
}
.computed b{font-family:'Fraunces';font-size:18px;font-variant-numeric:tabular-nums;}

.toggle-row{display:flex;gap:8px;margin-bottom:14px;}
.toggle-row button{
  flex:1;padding:11px;border-radius:12px;font-size:13px;font-weight:600;
  border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);
}
.toggle-row button.on-j{background:var(--green-soft);border-color:var(--green);color:var(--green-deep);}
.toggle-row button.on-u{background:var(--rust-soft);border-color:var(--rust);color:var(--rust-deep);}

.sheet-actions{display:flex;gap:10px;margin-top:6px;}
.btn{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:600;text-align:center;}
.btn-primary{background:var(--ink);color:var(--paper);}
.btn-primary:active{background:#1c1815;}
.btn-ghost{background:var(--card);border:1.5px solid var(--line);color:var(--ink-soft);}
.btn-danger{background:var(--rust-soft);color:var(--rust-deep);border:1.5px solid #E0C3B0;flex:none;width:52px;display:grid;place-items:center;}

.list-item{
  display:flex;align-items:center;gap:12px;
  padding:14px;background:var(--card);
  border:1.5px solid var(--line-soft);border-radius:14px;margin-bottom:9px;
}
.list-item:active{background:var(--card-2);}
.list-item .li-ico{
  width:38px;height:38px;border-radius:11px;background:var(--paper-2);
  display:grid;place-items:center;flex:none;color:var(--ink-soft);
}
.list-item .li-body{flex:1;min-width:0;}
.list-item .li-title{font-weight:600;font-size:14.5px;}
.list-item .li-sub{font-size:11.5px;color:var(--ink-soft);}
.list-item.cur{border-color:var(--green);background:var(--green-soft);}
.list-item .li-act{
  width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  color:var(--ink-faint);background:var(--paper-2);flex:none;
}

.info-card{
  background:var(--card);border:1px solid var(--line-soft);
  border-radius:16px;padding:16px;margin:0 16px 14px;
  box-shadow:0 3px 12px -7px var(--shadow);
}
.info-card h3{font-family:'Fraunces';font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.info-card ol,.info-card ul{margin-left:18px;font-size:13.5px;color:var(--ink-soft);}
.info-card li{margin-bottom:7px;}
.info-card li b{color:var(--ink);}
.info-card p{font-size:13.5px;color:var(--ink-soft);margin-bottom:8px;}

.toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:calc(110px + env(safe-area-inset-bottom));z-index:80;
  background:var(--ink);color:var(--paper);
  padding:11px 18px;border-radius:30px;font-size:13px;font-weight:500;
  opacity:0;transition:.3s;pointer-events:none;
  box-shadow:0 8px 24px -6px var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.divider-note{
  text-align:center;font-size:11px;color:var(--ink-faint);
  padding:18px 16px 4px;
}
.back-link{
  display:flex;align-items:center;gap:6px;color:var(--ink-soft);
  font-size:13px;font-weight:600;padding:14px 16px 2px;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="month-btn" data-act="open-months">
      <span class="kicker">Balance Sheet</span>
      <span class="mname" id="hdrMonth">January 2025</span>
    </button>
    <button class="icon-btn" data-act="open-settings" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <div id="screen-overview" class="screen active"></div>
  <div id="screen-current" class="screen"></div>
  <div id="screen-credit" class="screen"></div>
  <div id="screen-debit" class="screen"></div>
  <div id="screen-analysis" class="screen"></div>
  <div id="screen-assets" class="screen"></div>
  <div id="screen-categories" class="screen"></div>
  <div id="screen-install" class="screen"></div>
  <div id="screen-about" class="screen"></div>

  <button class="fab" id="fab" data-act="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

  <nav class="tabbar">
    <button class="tab active" data-tab="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      <span>Overview</span>
    </button>
    <button class="tab" data-tab="current">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>
      <span>Current</span>
    </button>
    <button class="tab" data-tab="credit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
      <span>Credit</span>
    </button>
    <button class="tab" data-tab="debit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2v20l3-2 3 2 3-2 3 2 3-2V2z"/><path d="M9 8h6M9 12h6"/></svg>
      <span>Debit</span>
    </button>
    <button class="tab" data-tab="analysis">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg>
      <span>Analysis</span>
    </button>
    <button class="tab" data-tab="assets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l3 6-9 12L3 9z"/><path d="M3 9h18"/></svg>
      <span>Assets</span>
    </button>
  </nav>
</div>

<div class="backdrop" id="backdrop" data-act="close-sheet"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   AMAR BALANCE SHEET - offline personal finance app
   Single file. Data persists in localStorage on the device.
   ============================================================ */
var LS_KEY = "amar_balance_sheet_v1";
var $ = function(s,r){ return (r||document).querySelector(s); };
function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3); }
function num(v){ var n=parseFloat(String(v==null?"":v).replace(/,/g,"")); return isNaN(n)?0:n; }
function fmt(n){ if(isNaN(n)) n=0; return n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt0(n){ if(isNaN(n)) n=0; return n.toLocaleString("en-US",{maximumFractionDigits:2}); }
function pct(a,b){ return b? (a/b*100):0; }
function fpct(n){ if(isNaN(n)) n=0; return n.toFixed(2)+"%"; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){

/* ---------- state ---------- */
var state;
function load(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(raw){ state = JSON.parse(raw); migrate(); return; }
  }catch(e){ console.warn("load failed",e); }
  state = defaultData();
  migrate();   // ensure new fields exist even on a fresh embedded snapshot
  save();
}
function migrate(){
  if(!state || !state.months || !Object.keys(state.months).length){ state = defaultData(); return; }
  if(!state.activeMonth || !state.months[state.activeMonth]){
    state.activeMonth = Object.keys(state.months)[0];
  }
  if(!state.activeTab) state.activeTab = "overview";
  for(var k in state.months){
    var m = state.months[k];
    m.groups = m.groups || [];
    m.categories = m.categories || [];
    m.incomeCategories = m.incomeCategories || [
      {id:uid(),name:"Salary"},{id:uid(),name:"Gift"},{id:uid(),name:"Other"}
    ];
    m.credit = m.credit || {sources:[],accounts:[]};
    m.credit.sources = m.credit.sources || [];
    m.credit.accounts = m.credit.accounts || [];
    var dfltCat = (m.incomeCategories[0]||{}).name || "Other";
    m.credit.sources.forEach(function(s){
      if(!s.category) s.category = dfltCat;
      // NEW: every income source now records where the money landed.
      // Default to "cash" for legacy data.
      if(!s.paidTo) s.paidTo = "cash";
    });
    if(m.credit.details) delete m.credit.details;
    m.debit = m.debit || {items:[],reconciliation:[]};
    m.debit.items = m.debit.items || [];
    m.debit.reconciliation = m.debit.reconciliation || [];
    m.debit.items.forEach(function(it){
      // Rename paymentMethod -> paidWith (more accurate; matches UI label).
      if(!it.paidWith){
        it.paidWith = it.paymentMethod || "cash";
      }
      if(it.paymentMethod) delete it.paymentMethod;
      if(it.cardPaymentTo == null) it.cardPaymentTo = "";
    });
    // NEW: the Current tab's pools.
    m.current = m.current || {};
    m.current.cash = m.current.cash || {baseBalance:0};
    if(m.current.cash.baseBalance == null) m.current.cash.baseBalance = 0;
    m.current.debitAccounts = m.current.debitAccounts || [];
    m.current.debitAccounts.forEach(function(d){
      if(d.baseBalance == null) d.baseBalance = 0;
      if(d.notes == null) d.notes = "";
    });
    // Cards now live under m.current.cards (moved from m.cards). Simpler schema:
    // just name, baseBalance, notes — no statementBalance or dueDate.
    if(!m.current.cards){
      var oldCards = m.cards || [];
      m.current.cards = oldCards.map(function(c){
        return {id:c.id||uid(), name:c.name||"", baseBalance:num(c.startingBalance||0), notes:c.notes||""};
      });
    }
    m.current.cards.forEach(function(c){
      if(c.baseBalance == null) c.baseBalance = num(c.startingBalance||0);
      if(c.notes == null) c.notes = "";
      // strip retired fields
      if("startingBalance" in c) delete c.startingBalance;
      if("statementBalance" in c) delete c.statementBalance;
      if("dueDate" in c) delete c.dueDate;
    });
    // remove old top-level m.cards array
    if(m.cards) delete m.cards;
    // Migrate old credit.accounts (Cash/UAB) into debit accounts if not done.
    // Only do this once: if debitAccounts is empty AND we have credit.accounts.
    if((m.current.debitAccounts||[]).length===0 && (m.credit.accounts||[]).length>0){
      m.credit.accounts.forEach(function(a){
        // Don't double-create if a "Cash" label and we already had cash setup
        if((a.label||"").toLowerCase()==="cash"){
          m.current.cash.baseBalance = num(a.amount);
        } else {
          m.current.debitAccounts.push({id:uid(),name:a.label||"Account",baseBalance:num(a.amount),notes:""});
        }
      });
      // Wipe legacy after migrating — keeps things clean.
      m.credit.accounts = [];
    }
    m.loans = m.loans || {total:0,entries:[]};
    m.savings = m.savings || {total:0,entries:[]};
    m.investment = m.investment || {total:0,roi:0,entries:[]};
    m.collectable = m.collectable || {total:0,entries:[]};
    ["loans","savings","investment","collectable"].forEach(function(pk){
      (m[pk].entries||[]).forEach(function(en){ if(en.notes==null) en.notes=""; });
    });
  }
}
var saveTimer;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    catch(e){ toast("Could not save - storage full?"); }
  },120);
}
function M(){ return state.months[state.activeMonth]; }

/* ---------- computations ---------- */
function creditTotal(m){ var s=0,a=m.credit.sources||[]; for(var i=0;i<a.length;i++) s+=num(a[i].amount); return s; }
function assetTotal(m,key){ return num((m[key]||{}).total); }
function itemTotal(it){ return num(it.unitPrice)*num(it.qty); }

/* A card payment is a transfer between buckets, not a real expense. It should
   NOT contribute to monthly "Total Debit", justified/unjustified sums, or
   category totals — those track new spending. Pool live balances still reflect
   the movement (source pool drops, target card's owed drops by the same amount,
   so net worth is unchanged). */
function isCardPayment(it){ return !!it.cardPaymentTo; }

function debitTotal(m){
  // Real spending only — excludes card payments (those settle past debt).
  var s=0,a=m.debit.items||[];
  for(var i=0;i<a.length;i++) if(!isCardPayment(a[i])) s+=itemTotal(a[i]);
  return s;
}
function cardPaymentsTotal(m){
  var s=0,a=m.debit.items||[];
  for(var i=0;i<a.length;i++) if(isCardPayment(a[i])) s+=itemTotal(a[i]);
  return s;
}
function balance(m){ return creditTotal(m)-debitTotal(m); }

/* ============================================================
   POOL-AWARE LEDGER
   Each expense and each income carries a "paidWith" / "paidTo"
   reference: "cash" (single cash pool), a debit account id,
   or a credit card id. The Current tab's three sections all
   derive their live balances from these references plus a
   manually-set baseBalance.
   ============================================================ */

/* What kind of pool does an id refer to in this month? */
function poolKind(m,id){
  if(!id || id==="cash") return "cash";
  var i;
  for(i=0;i<(m.current.debitAccounts||[]).length;i++)
    if(m.current.debitAccounts[i].id===id) return "debit";
  for(i=0;i<(m.current.cards||[]).length;i++)
    if(m.current.cards[i].id===id) return "card";
  return "unknown";
}
function debitAccountById(m,id){
  var a=(m.current.debitAccounts||[]);
  for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i];
  return null;
}
function cardById(m,id){
  var a=(m.current.cards||[]);
  for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i];
  return null;
}
function poolName(m,id){
  if(!id || id==="cash") return "Cash";
  var d=debitAccountById(m,id); if(d) return d.name||"Debit";
  var c=cardById(m,id); if(c) return c.name||"Card";
  return "Unknown";
}

/* What's the entry's paidWith reference? Treat missing/legacy as cash. */
function paidWith(it){ return it.paidWith || it.paymentMethod || "cash"; }

/* === This-month sums by pay method (rolling totals) === */
// Regular expense out of cash (not a card payment from cash).
function cashSpentTotal(m){
  var s=0,a=m.debit.items||[],i,it;
  for(i=0;i<a.length;i++){
    it=a[i];
    if(paidWith(it)==="cash" && !it.cardPaymentTo) s += itemTotal(it);
  }
  return s;
}
// Money charged to a debit account this month (not card payments).
function debitSpentTotal(m){
  var s=0,a=m.debit.items||[],i,it;
  for(i=0;i<a.length;i++){
    it=a[i];
    if(poolKind(m,paidWith(it))==="debit" && !it.cardPaymentTo) s += itemTotal(it);
  }
  return s;
}
// Money charged to a credit card this month.
function creditCardSpentTotal(m){
  var s=0,a=m.debit.items||[],i,it;
  for(i=0;i<a.length;i++){
    it=a[i];
    if(poolKind(m,paidWith(it))==="card" && !it.cardPaymentTo) s += itemTotal(it);
  }
  return s;
}
// Total paid down from cash/debit toward any card this month.
function cardPaymentsFromCashAndDebit(m){
  var s=0,a=m.debit.items||[],i,it,k;
  for(i=0;i<a.length;i++){
    it=a[i];
    if(!it.cardPaymentTo) continue;
    k=poolKind(m,paidWith(it));
    if(k==="cash" || k==="debit") s += itemTotal(it);
  }
  return s;
}

/* === Income totals by destination pool === */
function incomeToPool(m,poolId){
  var s=0,a=m.credit.sources||[],i;
  for(i=0;i<a.length;i++){
    var target = a[i].paidTo || "cash";
    if(target===poolId) s += num(a[i].amount);
  }
  return s;
}

/* === Expense totals by paying pool === */
function expensesFromPool(m,poolId){
  var s=0,a=m.debit.items||[],i;
  for(i=0;i<a.length;i++){
    if(paidWith(a[i])===poolId && !a[i].cardPaymentTo) s += itemTotal(a[i]);
  }
  return s;
}
function cardPaymentsFromPool(m,poolId){
  var s=0,a=m.debit.items||[],i;
  for(i=0;i<a.length;i++){
    if(a[i].cardPaymentTo && paidWith(a[i])===poolId) s += itemTotal(a[i]);
  }
  return s;
}

/* === Live balances === */
// Cash live = base + income to cash - expenses paid w/ cash - card payments from cash
function cashLiveBalance(m){
  return num(m.current.cash.baseBalance)
       + incomeToPool(m,"cash")
       - expensesFromPool(m,"cash")
       - cardPaymentsFromPool(m,"cash");
}
function debitAccountLiveBalance(m,accId){
  var a=debitAccountById(m,accId); if(!a) return 0;
  return num(a.baseBalance)
       + incomeToPool(m,accId)
       - expensesFromPool(m,accId)
       - cardPaymentsFromPool(m,accId);
}
// Card charges (this month) = expenses paid with that card (not card payments)
function cardChargesThisMonth(m,cardId){
  var s=0,a=m.debit.items||[],i;
  for(i=0;i<a.length;i++){
    if(paidWith(a[i])===cardId && !a[i].cardPaymentTo) s += itemTotal(a[i]);
  }
  return s;
}
// Payments toward this card = any expense with cardPaymentTo=this card, minus any income going TO this card (cashback)
function cardPaymentsThisMonth(m,cardId){
  var s=0,a=m.debit.items||[],i;
  for(i=0;i<a.length;i++){
    if(a[i].cardPaymentTo===cardId) s += itemTotal(a[i]);
  }
  return s;
}
function cardCashbackThisMonth(m,cardId){
  return incomeToPool(m,cardId);  // income tagged paidTo=card lowers what's owed
}
// Card live overdue = base + new charges - payments - cashback
function cardLiveBalance(m,cardId){
  var c=cardById(m,cardId); if(!c) return 0;
  return num(c.baseBalance)
       + cardChargesThisMonth(m,cardId)
       - cardPaymentsThisMonth(m,cardId)
       - cardCashbackThisMonth(m,cardId);
}

/* === Aggregates === */
function debitAccountsTotal(m){
  var s=0,a=(m.current.debitAccounts||[]),i;
  for(i=0;i<a.length;i++) s += debitAccountLiveBalance(m,a[i].id);
  return s;
}
function cardsOwedTotal(m){
  var s=0,a=(m.current.cards||[]),i;
  for(i=0;i<a.length;i++) s += cardLiveBalance(m,a[i].id);
  return s;
}
function netWorth(m){
  // Liquid assets (cash + debit accounts) - liabilities (loans + cards)
  // + long-term assets (savings + investment + collectable)
  return cashLiveBalance(m)
       + debitAccountsTotal(m)
       + assetTotal(m,"savings")
       + assetTotal(m,"investment")
       + assetTotal(m,"collectable")
       - assetTotal(m,"loans")
       - cardsOwedTotal(m);
}

function justifiedTotal(m){
  var s=0,a=m.debit.items||[];
  for(var i=0;i<a.length;i++) if(a[i].justified && !isCardPayment(a[i])) s+=itemTotal(a[i]);
  return s;
}
function unjustifiedTotal(m){
  var s=0,a=m.debit.items||[];
  for(var i=0;i<a.length;i++) if(!a[i].justified && !isCardPayment(a[i])) s+=itemTotal(a[i]);
  return s;
}
function categoryTotals(m){
  // Exclude card payments — they're transfers, not categorized spending.
  var map={},i;
  for(i=0;i<(m.categories||[]).length;i++) map[m.categories[i].name]=0;
  for(i=0;i<(m.debit.items||[]).length;i++){
    var it=m.debit.items[i];
    if(isCardPayment(it)) continue;
    map[it.category]=(map[it.category]||0)+itemTotal(it);
  }
  return map;
}
function groupOf(m,catName){
  var a=m.categories||[];
  for(var i=0;i<a.length;i++) if(a[i].name===catName) return a[i].group;
  return "Others";
}
function groupTotals(m){
  var ct=categoryTotals(m), map={}, i;
  for(i=0;i<(m.groups||[]).length;i++) map[m.groups[i]]=0;
  for(var cn in ct){
    var g=groupOf(m,cn);
    if(!(g in map)) map[g]=0;
    map[g]+=ct[cn];
  }
  return map;
}
function foodCategories(m){
  return (m.categories||[]).filter(function(c){ return c.group==="Food"; });
}

var debitFilter={q:"",cat:"All",pay:"All"};
function renderDebit(){
  var m=M();

  var cashSp=cashSpentTotal(m), debSp=debitSpentTotal(m), cardSp=creditCardSpentTotal(m);
  var catSet={}, cats=["All"];
  items.forEach(function(i){ if(!catSet[i.category]){ catSet[i.category]=1; cats.push(i.category); } });
  var q=debitFilter.q.toLowerCase();
  var filtered=items.filter(function(it){
    if(debitFilter.cat!=="All" && it.category!==debitFilter.cat) return false;
    var k = poolKind(m, paidWith(it));
    if(debitFilter.pay==="cash" && k!=="cash") return false;
    if(debitFilter.pay==="debit" && k!=="debit") return false;
    if(debitFilter.pay==="card" && k!=="card") return false;
    if(q && (it.name||"").toLowerCase().indexOf(q)<0 && (it.category||"").toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  var filtTotal=0; filtered.forEach(function(x){ filtTotal+=itemTotal(x); });

  // Helper: render the payment-method badge for a debit row.
  function payBadge(it){
    if(it.cardPaymentTo){
      var c=cardById(m,it.cardPaymentTo);
      return '<span class="pay-badge payment" title="Card payment">&#8595; '+(c?esc(c.name):"Card Payment")+'</span>';
    }
    var pw = paidWith(it);
    var kind = poolKind(m,pw);
    if(kind==="cash") return '<span class="pay-badge cash">Cash</span>';
    if(kind==="debit"){
      var d=debitAccountById(m,pw);
      return '<span class="pay-badge cash">'+(d?esc(d.name):"Debit")+'</span>';

    if(kind==="card"){
      var c2=cardById(m,pw);

      '<div class="row-meta">verification check</div></div>'+
      '<div class="row-val num">'+curSpan()+fmt(num(r.amount))+'</div>'+CHEV+'</div>';
  }).join("");

  // Compact card strip showing each card's current balance, tap to jump to Current.
  var cardStripHtml="";
  if(((m.current&&m.current.cards)||[]).length>0){
    cardStripHtml='<div class="card-strip">'+
      (m.current.cards||[]).map(function(c){
        return '<div class="card-chip" data-act="goto" data-tab="current">'+
          '<div class="cc-name">'+esc(c.name||"Card")+'</div>'+

        '</div>';
      }).join("")+
    '</div>';

/* ---------- ANALYSIS ---------- */
var analysisView="groups";
function renderAnalysis(){
  var m=M();
  var db=debitTotal(m);
  var jt=justifiedTotal(m), ut=unjustifiedTotal(m);
  var gt=groupTotals(m);
  var ct=categoryTotals(m);

  var groupOrder=(m.groups||[]).slice().sort(function(a,b){ return (gt[b]||0)-(gt[a]||0); });
  var gMax=Math.max.apply(null,Object.keys(gt).map(function(k){return gt[k];}).concat([1]));
  var groupsHtml=groupOrder.map(function(g){
    return '<div class="bar-item"><div class="bar-top"><span class="bar-name">'+esc(g)+'</span>'+
      '<span class="bar-vals"><b class="num">$'+fmt(gt[g]||0)+'</b> &middot; '+fpct(pct(gt[g]||0,db))+'</span></div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct(gt[g]||0,gMax)+'%"></div></div></div>';
  }).join("");

  var catList=Object.keys(ct).map(function(k){return [k,ct[k]];}).sort(function(a,b){return b[1]-a[1];});
  var cMax=catList.length?Math.max(catList[0][1],1):1;
  var catsHtml=catList.map(function(p){
    return '<div class="bar-item"><div class="bar-top">'+
      '<span class="bar-name">'+esc(p[0])+' <span style="color:var(--ink-faint);font-weight:500;font-size:11px">&middot; '+esc(groupOf(m,p[0]))+'</span></span>'+
      '<span class="bar-vals"><b class="num">$'+fmt(p[1])+'</b> &middot; '+fpct(pct(p[1],db))+'</span></div>'+
      '<div class="bar-track"><div class="bar-fill r" style="width:'+pct(p[1],cMax)+'%"></div></div></div>';
  }).join("");

  var foodCats=foodCategories(m);
  var foodTotal=0; foodCats.forEach(function(c){ foodTotal+=(ct[c.name]||0); });
  var fMax=Math.max.apply(null,foodCats.map(function(c){return ct[c.name]||0;}).concat([1]));
  var nutriHtml=foodCats.map(function(c){
    return '<div class="bar-item"><div class="bar-top"><span class="bar-name">'+esc(c.name)+'</span>'+
      '<span class="bar-vals"><b class="num">$'+fmt(ct[c.name]||0)+'</b> &middot; '+fpct(pct(ct[c.name]||0,foodTotal))+'</span></div>'+
      '<div class="bar-track"><div class="bar-fill g" style="width:'+pct(ct[c.name]||0,fMax)+'%"></div></div></div>';
  }).join("");

  var body=
  '<div class="pad"><div class="scr-title">Analysis</div></div>'+
  '<div class="gauge-card" style="margin-top:6px">'+
    '<div style="display:flex;justify-content:space-between;align-items:baseline">'+
      '<div class="section-title" style="font-size:15px">Justified vs Unjustified</div>'+
      '<div style="font-family:\'Fraunces\';font-weight:600;font-size:17px" class="num">'+fpct(pct(jt,db))+'</div></div>'+
    '<div class="gauge-track"><div class="gauge-j" style="width:'+pct(jt,db)+'%"></div></div>'+
    '<div class="gauge-legend">'+
      '<span><span class="dotg">&#9679;</span> Justified <b class="num">$'+fmt(jt)+'</b></span>'+
      '<span><span class="dotr">&#9679;</span> Unjustified <b class="num">$'+fmt(ut)+'</b></span></div>'+
  '</div>'+
  '<div style="height:14px"></div>'+
  '<div class="seg">'+
    '<button class="'+(analysisView==="groups"?"on":"")+'" data-act="analysis-view" data-view="groups">Groups</button>'+
    '<button class="'+(analysisView==="categories"?"on":"")+'" data-act="analysis-view" data-view="categories">Categories</button>'+
    '<button class="'+(analysisView==="nutrition"?"on":"")+'" data-act="analysis-view" data-view="nutrition">Nutrition</button>'+
  '</div>';

  if(analysisView==="groups"){
    body+='<div class="section" style="margin-top:14px"><div class="section-head">'+
      '<div class="section-title"><span class="acc"></span>Spending by Group</div>'+
      '<div class="section-sub">Total $'+fmt(db)+'</div></div>'+
      '<div class="card">'+(groupsHtml||emptyRow("No data"))+
      '<div class="foot-row"><span class="fl">Total</span><span class="fv num">$'+fmt(db)+' &middot; 100%</span></div></div></div>';
  } else if(analysisView==="categories"){
    body+='<div class="section" style="margin-top:14px"><div class="section-head">'+
      '<div class="section-title"><span class="acc"></span>Spending by Category</div>'+
      '<div class="section-sub">'+catList.length+' categories</div></div>'+
      '<div class="card">'+(catsHtml||emptyRow("No data"))+
      '<div class="foot-row"><span class="fl">Total</span><span class="fv num">$'+fmt(db)+' &middot; 100%</span></div></div></div>';
  } else {
    body+='<div class="section" style="margin-top:14px"><div class="section-head">'+
      '<div class="section-title"><span class="acc"></span>Nutrition Analysis</div>'+
      '<div class="section-sub">Food spend only</div></div>'+
      '<div class="card">'+
        '<div class="foot-row" style="border-top:none;border-bottom:1.5px solid var(--line)">'+
        '<span class="fl">Total Spent on Food</span><span class="fv num">$'+fmt(foodTotal)+'</span></div>'+
        (nutriHtml||emptyRow("No food categories"))+
      '</div></div>';
  }
  body+='<div class="divider-note">Figures update live from your Debit entries</div>';
  $("#screen-analysis").innerHTML=body;
}

/* ---------- CATEGORIES MANAGER ---------- */
function renderCategories(){
  var m=M();
  var ct=categoryTotals(m);
  var byGroup={};
  (m.categories||[]).forEach(function(c){ (byGroup[c.group]=byGroup[c.group]||[]).push(c); });
  var order=(m.groups||[]).slice();
  Object.keys(byGroup).forEach(function(g){ if(order.indexOf(g)<0) order.push(g); });

  var html="";
  order.forEach(function(g){
    if(!byGroup[g]) return;
    html+='<div class="grp-label" style="border-radius:0">'+esc(g)+' &middot; group</div>';
    html+=byGroup[g].map(function(c){
      var used=(m.debit.items||[]).filter(function(i){return i.category===c.name;}).length;
      return '<div class="row" data-act="edit" data-kind="category" data-id="'+c.id+'">'+
        '<div class="row-body"><div class="row-name">'+esc(c.name)+'</div>'+
        '<div class="row-meta">used in '+used+' expense'+(used===1?"":"s")+'</div></div>'+
        '<div class="row-val num" style="font-size:14px">'+((ct[c.name]||0)>0?"$"+fmt(ct[c.name]):"&mdash;")+'</div>'+CHEV+'</div>';
    }).join("");
  });

  // income categories
  var incRows=(m.incomeCategories||[]).map(function(c){
    var used=(m.credit.sources||[]).filter(function(s){return s.category===c.name;}).length;
    var sum=0; (m.credit.sources||[]).forEach(function(s){ if(s.category===c.name) sum+=num(s.amount); });
    return '<div class="row" data-act="edit" data-kind="incomeCategory" data-id="'+c.id+'">'+
      '<div class="row-body"><div class="row-name">'+esc(c.name)+'</div>'+
      '<div class="row-meta">used by '+used+' income source'+(used===1?"":"s")+'</div></div>'+
      '<div class="row-val num" style="font-size:14px">'+(sum>0?"$"+fmt(sum):"&mdash;")+'</div>'+CHEV+'</div>';
  }).join("");

  $("#screen-categories").innerHTML=
  '<div class="back-link" data-act="open-settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Settings</div>'+
  '<div class="pad" style="padding-top:4px"><div class="scr-title">Categories &amp; Groups</div></div>'+
  '<div class="section" style="margin-top:6px"><div class="section-head">'+
    '<div class="section-title"><span class="acc"></span>Income Categories</div>'+
    '<button class="add-btn" data-act="add" data-kind="incomeCategory">'+PLUS+'New</button></div>'+
    '<div class="card">'+(incRows||emptyRow("No income categories"))+'</div></div>'+
  '<div class="section"><div class="section-head">'+
    '<div class="section-title"><span class="acc"></span>Expense Structure</div>'+
    '<button class="add-btn" data-act="add" data-kind="category">'+PLUS+'New</button></div>'+
    '<div class="card">'+(html||emptyRow("No categories"))+'</div></div>'+
  '<div class="info-card" style="margin-top:16px">'+
    '<p><b>Income categories</b> tag each income source (Salary, Gift, Loan Received...). <b>Expense categories</b> tag each expense and roll up into <b>groups</b> (e.g. Protein &rarr; Food) - the Analysis tab uses that structure. Both lists can change month to month; edit them here freely.</p>'+
  '</div>'+
  '<div class="divider-note">Tap any category to rename, regroup, or delete it</div>';
}

function find(arr,id){
  for(var i=0;i<arr.length;i++) if(arr[i].id===id) return arr[i];
  return null;
}
function val(id){ var el=$("#"+id); return el?el.value.trim():""; }

/* ---------- save from sheet ---------- */
function saveEdit(kind,id,panel){
  var m=M(), isNew=!id;

  if(kind==="creditSource"){
    var label=val("f_label"), amount=num(val("f_amount")), category=val("f_category");
    var paidTo=val("f_paidto")||"cash";
    if(!label){ toast("Give it a name"); return; }
    if(!category) category=((m.incomeCategories[0]||{}).name||"Other");
    if(isNew) m.credit.sources.push({id:uid(),label:label,amount:amount,category:category,paidTo:paidTo});
    else {
      var o=find(m.credit.sources,id);
      o.label=label; o.amount=amount; o.category=category; o.paidTo=paidTo;
    }
  }
  else if(kind==="incomeCategory"){
    var name=val("f_name");
    if(!name){ toast("Name the category"); return; }
    if(isNew){
      if((m.incomeCategories||[]).some(function(c){return c.name.toLowerCase()===name.toLowerCase();})){
        toast("That category already exists"); return;
      }
      m.incomeCategories.push({id:uid(),name:name});
    } else {
      var o=find(m.incomeCategories,id), oldName=o.name;
      o.name=name;
      if(oldName!==name){
        (m.credit.sources||[]).forEach(function(s){ if(s.category===oldName) s.category=name; });
      }
    }
  }
  else if(kind==="debitItem"){
    var name=val("f_name"), unit=num(val("f_unit")), qty=num(val("f_qty"));
    var cat=val("f_category");
    var justified = $("#tg_j").className==="on-j";
    var paidWithVal = val("f_paymethod") || "cash";
    var cpOn=$("#tg_cp_on");
    var isCardPayment = !!(cpOn && cpOn.className==="on-j");
    var cardPaymentTo = isCardPayment ? (val("f_cardpayto")||"") : "";
    if(!name){ toast("Give the expense a name"); return; }
    if(qty===0) qty=1;
    if(cat==="__new__"){
      var nc=val("f_newcat"), ng=val("f_newgroup")||"Others";
      if(!nc){ toast("Name the new category"); return; }
      if(!categoryExists(m,nc)){
        m.categories.push({id:uid(),name:nc,group:ng});
        if((m.groups||[]).indexOf(ng)<0) m.groups.push(ng);
      }
      cat=nc;
    }
    if(isCardPayment && !cardPaymentTo){
      toast("Pick which card this payment reduces"); return;
    }
    // Card payments must come from cash or a debit account — not another card.
    if(isCardPayment && poolKind(m,paidWithVal)==="card"){
      toast("Pay cards from cash or a debit account, not another card"); return;
    }
    // Safety check: can't pay down a card *with* that same card.
    if(isCardPayment && paidWithVal===cardPaymentTo){
      toast("A card can't pay itself - pick a different source"); return;
    }
    if(isNew) m.debit.items.push({id:uid(),name:name,unitPrice:unit,qty:qty,category:cat,justified:justified,paidWith:paidWithVal,cardPaymentTo:cardPaymentTo});
    else {
      var o=find(m.debit.items,id);
      o.name=name; o.unitPrice=unit; o.qty=qty; o.category=cat; o.justified=justified;
      o.paidWith=paidWithVal; o.cardPaymentTo=cardPaymentTo;
      if(o.paymentMethod) delete o.paymentMethod;
    }
  }
  else if(kind==="card"){
    var cname=val("f_cardname");
    var bb=num(val("f_basebal")), notes=val("f_cardnotes");
    if(!cname){ toast("Name the card"); return; }
    if(isNew){
      m.current.cards.push({id:uid(),name:cname,baseBalance:bb,notes:notes});
    } else {
      var c=cardById(m,id);
      c.name=cname; c.baseBalance=bb; c.notes=notes;
    }
  }
  else if(kind==="debitAccount"){
    var dname=val("f_dname");
    var dbb=num(val("f_dbase")), dnotes=val("f_dnotes");
    if(!dname){ toast("Name the account"); return; }
    if(isNew){
      m.current.debitAccounts.push({id:uid(),name:dname,baseBalance:dbb,notes:dnotes});
    } else {
      var d=debitAccountById(m,id);
      d.name=dname; d.baseBalance=dbb; d.notes=dnotes;
    }
  }
  else if(kind==="reconciliation"){
    var item=val("f_item"), status=val("f_status"), amount=num(val("f_amount"));
    if(!item){ toast("Give the item a name"); return; }
    if(isNew) m.debit.reconciliation.push({id:uid(),item:item,status:status,amount:amount});
    else { var o=find(m.debit.reconciliation,id); o.item=item; o.status=status; o.amount=amount; }
  }
  else if(kind==="assetEntry"){
    var label=val("f_label"), value=val("f_value"), notes=val("f_notes");
    if(!label && !value){ toast("Add a label or value"); return; }
    var p=m[panel];
    if(isNew) p.entries.push({id:uid(),label:label,value:value,notes:notes});
    else { var o=find(p.entries,id); o.label=label; o.value=value; o.notes=notes; }
  }
  else if(kind==="category"){
    var name=val("f_name"), group=val("f_group")||"Others";
    if(!name){ toast("Name the category"); return; }
    if(isNew){
      if(categoryExists(m,name)){ toast("That category already exists"); return; }
      m.categories.push({id:uid(),name:name,group:group});
    } else {
      var o=find(m.categories,id), oldName=o.name;
      o.name=name; o.group=group;
      if(oldName!==name){
        (m.debit.items||[]).forEach(function(it){ if(it.category===oldName) it.category=name; });
      }
    }
    if((m.groups||[]).indexOf(group)<0) m.groups.push(group);
  }

  save(); closeSheet(); render();
  toast(isNew?"Added":"Saved");
}
function categoryExists(m,name){
  return (m.categories||[]).some(function(c){ return c.name.toLowerCase()===name.toLowerCase(); });
}

function deleteEdit(kind,id,panel){
  var m=M();
  var maps={
    creditSource:m.credit.sources,
    debitItem:m.debit.items,
    reconciliation:m.debit.reconciliation, category:m.categories
  };
  if(kind==="assetEntry"){
    m[panel].entries=m[panel].entries.filter(function(x){ return x.id!==id; });
  } else if(kind==="category"){
    var c=find(m.categories,id);
    var used=(m.debit.items||[]).filter(function(i){return i.category===c.name;}).length;
    if(used>0){ toast("In use by "+used+" expense"+(used===1?"":"s")+" - reassign first"); return; }
    m.categories=m.categories.filter(function(x){ return x.id!==id; });
  } else if(kind==="incomeCategory"){
    var ic=find(m.incomeCategories,id);
    var usedI=(m.credit.sources||[]).filter(function(s){return s.category===ic.name;}).length;
    if(usedI>0){ toast("In use by "+usedI+" source"+(usedI===1?"":"s")+" - reassign first"); return; }
    if((m.incomeCategories||[]).length<=1){ toast("Keep at least one income category"); return; }
    m.incomeCategories=m.incomeCategories.filter(function(x){ return x.id!==id; });
  } else if(kind==="card"){
    // Refuse to delete if any entry references this card.
    var usedC=(m.debit.items||[]).filter(function(it){
      return paidWith(it)===id || it.cardPaymentTo===id;
    }).length + (m.credit.sources||[]).filter(function(s){ return s.paidTo===id; }).length;
    if(usedC>0){ toast("Card is used by "+usedC+" entr"+(usedC===1?"y":"ies")+" - reassign first"); return; }
    m.current.cards=(m.current.cards||[]).filter(function(x){ return x.id!==id; });
  } else if(kind==="debitAccount"){
    var usedD=(m.debit.items||[]).filter(function(it){
      return paidWith(it)===id;
    }).length + (m.credit.sources||[]).filter(function(s){ return s.paidTo===id; }).length;
    if(usedD>0){ toast("Account is used by "+usedD+" entr"+(usedD===1?"y":"ies")+" - reassign first"); return; }
    m.current.debitAccounts=(m.current.debitAccounts||[]).filter(function(x){ return x.id!==id; });
  } else if(maps[kind]){
    var arr=maps[kind];
    for(var i=0;i<arr.length;i++){ if(arr[i].id===id){ arr.splice(i,1); break; } }
  }
  save(); closeSheet(); render();
  toast("Deleted");
}

/* ---------- months ---------- */
function monthKey(){ return "m"+uid(); }
function saveMonth(id){
  var label=val("f_label");
  if(!label){ toast("Name the month"); return; }
  if(id){
    state.months[id].label=label;
    toast("Renamed");
  } else {
    var src=M();
    var key=monthKey();
    // Carry the Current pools forward at their live balances.
    var srcCur = src.current || {cash:{baseBalance:0},debitAccounts:[],cards:[]};
    var carriedCash = { baseBalance: cashLiveBalance(src) };
    var carriedDebit = (srcCur.debitAccounts||[]).map(function(a){
      return { id:uid(), name:a.name, baseBalance:debitAccountLiveBalance(src,a.id), notes:a.notes||"" };
    });
    var carriedCards = (srcCur.cards||[]).map(function(c){
      return { id:uid(), name:c.name, baseBalance:cardLiveBalance(src,c.id), notes:c.notes||"" };
    });
    // Carry Assets panels forward — loans, savings, investment, collectable are
    // ongoing balances, not monthly transactions. Preserve total, entries, and
    // (for investment) ROI. Give each entry a fresh id so months stay independent.
    function carryPanel(panelKey, extraFields){
      var src_p = src[panelKey] || {total:0, entries:[]};
      var carried = {
        total: num(src_p.total),
        entries: (src_p.entries||[]).map(function(e){
          return { id:uid(), label:e.label||"", value:num(e.value), notes:e.notes||"" };
        })
      };
      if(extraFields){
        for(var k in extraFields) carried[k] = extraFields[k];
      }
      return carried;
    }
    state.months[key]={
      label:label,
      groups:(src.groups||[]).slice(),
      categories:(src.categories||[]).map(function(c){ return {id:uid(),name:c.name,group:c.group}; }),
      incomeCategories:(src.incomeCategories||[]).map(function(c){ return {id:uid(),name:c.name}; }),
      current:{cash:carriedCash, debitAccounts:carriedDebit, cards:carriedCards},
      credit:{sources:[],accounts:[]},
      debit:{items:[],reconciliation:[]},
      loans:      carryPanel("loans"),
      savings:    carryPanel("savings"),
      investment: carryPanel("investment", {roi: num((src.investment||{}).roi)}),
      collectable:carryPanel("collectable")
    };
    state.activeMonth=key;
    state.activeTab="overview";
    toast("Month created");
  }
  save(); closeSheet(); render();
}
function deleteMonth(id){
  if(Object.keys(state.months).length<=1){ toast("Keep at least one month"); return; }
  delete state.months[id];
  if(state.activeMonth===id) state.activeMonth=Object.keys(state.months)[0];

  toast("Month deleted");
}

/* Adjusts a pool's base balance directly. */
function saveAdjustPool(poolId, dir){
  var m=M();
  var amt=num(val("f_adj"));
  if(isNaN(amt)){ toast("Enter a number"); return; }
  if(dir==="set"){
    // The user wants the LIVE balance to be exactly amt. Adjust base accordingly.
    var live = poolId==="cash" ? cashLiveBalance(m) : debitAccountLiveBalance(m,poolId);
    var diff = amt - live;
    if(poolId==="cash") m.current.cash.baseBalance = num(m.current.cash.baseBalance) + diff;
    else {
      var d = debitAccountById(m,poolId);
      d.baseBalance = num(d.baseBalance) + diff;
    }
  } else {
    var sign = dir==="plus" ? 1 : -1;
    if(poolId==="cash") m.current.cash.baseBalance = num(m.current.cash.baseBalance) + sign*amt;
    else {
      var d2 = debitAccountById(m,poolId);
      d2.baseBalance = num(d2.baseBalance) + sign*amt;
    }
  }
  save(); closeSheet(); render();
  toast(dir==="set"?"Total updated":(dir==="plus"?"Added":"Subtracted"));
}

/* ---------- backup ---------- */
function exportBackup(){
  try{
    var data=JSON.stringify(state,null,2);
    var blob=new Blob([data],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var d=new Date();
    var stamp=d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
    a.href=url; a.download="amar-balance-sheet-backup-"+stamp+".json";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); },1000);
    toast("Backup downloaded");
  }catch(e){ toast("Export failed"); }
}
function handleImportFile(e){
  var file=e.target.files&&e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var imported=JSON.parse(ev.target.result);
      if(!imported || !imported.months || !Object.keys(imported.months).length){
        toast("Not a valid backup file"); return;
      }
      state=imported;
      migrate(); save();
      closeSheet(); render();
      toast("Backup restored");
    }catch(err){ toast("Could not read that file"); }
  };
  reader.onerror=function(){ toast("Could not read that file"); };
  reader.readAsText(file);
}
function confirmReset(){
  openSheet(
    '<div class="sheet-title">Reset everything?</div>'+
    '<div class="sheet-desc">This erases all months and entries on this device and reloads the original January 2025 sample. Export a backup first if you want to keep your data.</div>'+
    '<div class="sheet-actions">'+

      '<button class="btn btn-primary" style="background:var(--rust-deep)" data-act="do-reset">Reset everything</button>'+
    '</div>'
  );
}
function doReset(){
  state=defaultData(); save(); closeSheet(); render();

}

/* ============================================================
   EVENT HANDLING - delegated
   ============================================================ */
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]");
  if(!el) return;
  var act=el.dataset.act;

  if(act==="goto"){ state.activeTab=el.dataset.tab; render(); }
  else if(act==="open-months"){ openMonths(); }
  else if(act==="open-settings"){ closeSheet(); openSettings(); }
  else if(act==="close-sheet"||act==="cancel"){ closeSheet(); }
  else if(act==="fab"){
    if(state.activeTab==="credit") openEdit("creditSource",null,null);
    else if(state.activeTab==="debit") openEdit("debitItem",null,null);
    else if(state.activeTab==="assets") openAssetAddSheet();
    else if(state.activeTab==="current") openCurrentAddSheet();
  }
  else if(act==="add"){ openEdit(el.dataset.kind,null,el.dataset.panel||null); }
  else if(act==="edit"){ openEdit(el.dataset.kind,el.dataset.id,el.dataset.panel||null); }
  else if(act==="save-edit"){ saveEdit(el.dataset.kind,el.dataset.id||null,el.dataset.panel||null); }
  else if(act==="delete-edit"){ deleteEdit(el.dataset.kind,el.dataset.id||null,el.dataset.panel||null); }
  else if(act==="adjust-pool"){
    // Pool +, -, or Set total. We piggy-back the openEdit dispatcher with kind=adjustPool,
    // panel=poolId, and id=direction ("plus"/"minus"/"set").
    openEdit("adjustPool", el.dataset.dir, el.dataset.pool);
  }
  else if(act==="save-adjust"){ saveAdjustPool(el.dataset.pool, el.dataset.dir); }
  else if(act==="debit-cat"){ debitFilter.cat=el.dataset.cat; render(); }
  else if(act==="debit-pay"){ debitFilter.pay=el.dataset.pay; render(); }
  else if(act==="analysis-view"){ analysisView=el.dataset.view; render(); }
  else if(act==="pick-month"){
    state.activeMonth=el.dataset.id; state.activeTab="overview";
    save(); closeSheet(); render();
  }
  else if(act==="rename-month"){ e.stopPropagation(); openEdit("month",el.dataset.id,null); }
  else if(act==="new-month"){ openEdit("month",null,null); }
  else if(act==="save-month"){ saveMonth(el.dataset.id||null); }
  else if(act==="delete-month"){ deleteMonth(el.dataset.id); }
  else if(act==="settings-export"){ exportBackup(); }
  else if(act==="settings-import"){ var fi=$("#importFile"); if(fi) fi.click(); }
  else if(act==="settings-categories"){ closeSheet(); state.activeTab="categories"; render(); }
  else if(act==="settings-install"){ closeSheet(); state.activeTab="install"; render(); }
  else if(act==="settings-about"){ closeSheet(); state.activeTab="about"; render(); }
  else if(act==="settings-reset"){ confirmReset(); }
  else if(act==="do-reset"){ doReset(); }
});

/* ---------- service worker (offline support + auto-update) ---------- */
/* Registers only when hosted over http(s). On a local file:// open it is
   skipped silently - the app still works fully, just without offline cache.
   When a new version is found on the server, it activates immediately and
   the page reloads once so you always see the latest version. */
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      // Check for a new version every time the app is opened.
      reg.update();
      // When an updated worker is found, tell it to take over right away.
      reg.addEventListener("updatefound",function(){
        var nw = reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange",function(){
          if(nw.state === "installed" && navigator.serviceWorker.controller){
            nw.postMessage("skip-waiting");
          }
        });
      });
    }).catch(function(){});

    // When the active worker changes (new version took over), reload once
    // so the fresh files are shown. Guarded so it only ever reloads a single time.
    var reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      if(reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}
